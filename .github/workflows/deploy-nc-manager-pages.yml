name: Deploy NC Manager to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "nc-manager-react/**"
      - ".github/workflows/deploy-nc-manager-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: nc-manager-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: nc-manager-react

      - name: Build app
        run: npm run build
        working-directory: nc-manager-react

      - name: Prepare Pages artifact
        run: |
          mkdir -p site/nc-manager-react
          cp -R nc-manager-react/dist/. site/nc-manager-react/
          cp nc-archivio.json site/nc-archivio.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
