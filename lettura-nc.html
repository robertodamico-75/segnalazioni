<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione NC - Vista PC</title>
  <style>
    :root {
      --bg: #edf2f8;
      --surface: #fff;
      --text: #12253d;
      --muted: #627792;
      --line: #d6e0ec;
      --primary: #0a63d8;
      --primary-dark: #084ea8;
      --ok: #1b8a4a;
      --danger: #be2b2b;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI Variable Display", "Aptos", "SF Pro Display", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at 8% 8%, #d8e7ff 0%, transparent 24%),
        radial-gradient(circle at 95% 90%, #d6f0e0 0%, transparent 26%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .layout {
      display: grid;
      grid-template-columns: 290px 1fr;
      min-height: 100vh;
      gap: 14px;
      padding: 14px;
    }
    .sidebar, .content {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--line);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      overflow: hidden;
    }
    .side-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }
    .side-head h1 {
      margin: 0;
      font-size: 1rem;
    }
    .side-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
    }
    .side-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
    }
    .btn.primary { color: #fff; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
    .btn.secondary { background: #e9eff8; color: #1a3858; }
    .btn.success { background: #e6f6ed; color: #176b3a; }
    .btn.danger { background: #ffe9e9; color: #9c2020; }
    .btn.block { width: 100%; }

    .nc-list {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f7faff;
      max-height: calc(100vh - 230px);
      overflow: auto;
      padding: 8px;
      display: grid;
      gap: 8px;
    }
    .nc-item {
      border: 1px solid #d8e3ef;
      border-left: 4px solid #b9c8da;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      cursor: pointer;
    }
    .nc-item.active { border-color: #9fc0ef; box-shadow: 0 0 0 2px #dceafc inset; }
    .nc-item[data-sev="Critica"] { border-left-color: var(--danger); }
    .nc-item h3 {
      margin: 0 0 6px;
      font-size: 0.86rem;
      line-height: 1.3;
    }
    .meta {
      font-size: 0.74rem;
      color: var(--muted);
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }
    .badge {
      border-radius: 999px;
      padding: 1px 8px;
      font-size: 0.68rem;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .stato-Bozza { background: #f2f4f6; color: #495564; border-color: #dde3e9; }
    .stato-Aperta { background: #e8f0fe; color: #0f4ea2; border-color: #c9dbfb; }
    .stato-Inviata { background: #e6f7ec; color: #187a42; border-color: #c7ecd6; }

    .content {
      display: flex;
      flex-direction: column;
    }
    .content-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .content-head h2 {
      margin: 0;
      font-size: 1rem;
    }
    .content-body {
      padding: 14px;
      overflow: auto;
      display: grid;
      gap: 12px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
    }
    .panel h3 {
      margin: 0 0 10px;
      font-size: 0.9rem;
      color: #183252;
    }
    .empty {
      padding: 14px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed #c8d6e5;
      border-radius: 12px;
      background: #fbfdff;
    }
    .grid { display: grid; gap: 9px; }
    .cols-2 { grid-template-columns: 1fr 1fr; }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.75rem;
      color: #3f5875;
      font-weight: 650;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid #cad7e5;
      border-radius: 10px;
      padding: 8px 9px;
      font: inherit;
      color: #13263e;
      background: #fff;
      font-size: 0.88rem;
    }
    textarea { min-height: 70px; resize: vertical; }
    .row-item {
      border: 1px solid var(--line);
      background: #f9fcff;
      border-radius: 10px;
      padding: 9px;
      margin-bottom: 8px;
    }
    .row-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.78rem;
      color: #425d7a;
      font-weight: 700;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 4px;
    }
    .msg {
      font-size: 0.82rem;
      padding: 8px 10px;
      border-radius: 10px;
      display: none;
    }
    .msg.ok { display: block; background: #e8f8ee; color: #196f3e; border: 1px solid #cbeed9; }
    .json {
      margin: 0;
      max-height: 220px;
      overflow: auto;
      border-radius: 10px;
      background: #0f1b2e;
      color: #d8e7ff;
      padding: 10px;
      font-size: 0.76rem;
    }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .nc-list { max-height: 300px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="side-head">
        <h1>Gestione NC (PC)</h1>
        <p>Stessa base dati della pagina mobile</p>
      </div>
      <div class="side-body">
        <button class="btn primary block" id="btnVisualizza">Visualizza NC</button>
        <button class="btn secondary block" id="btnRicarica">Ricarica elenco</button>
        <div id="listaNc" class="nc-list"></div>
      </div>
    </aside>

    <section class="content">
      <div class="content-head">
        <h2 id="titoloDettaglio">Seleziona una NC</h2>
        <span id="badgeStato"></span>
      </div>
      <div class="content-body" id="contentBody">
        <div class="panel">
          <div class="empty">Seleziona una NC dalla barra laterale per gestire i dettagli avanzati.</div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "demo_nc_salvate_v2";
    const listaNcEl = document.getElementById("listaNc");
    const contentBody = document.getElementById("contentBody");
    const titoloDettaglio = document.getElementById("titoloDettaglio");
    const badgeStato = document.getElementById("badgeStato");

    let archivio = [];
    let selezionata = null;

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, function(ch) {
        if (ch === "&") return "&amp;";
        if (ch === "<") return "&lt;";
        if (ch === ">") return "&gt;";
        if (ch === "\"") return "&quot;";
        return "&#39;";
      });
    }

    function leggiArchivio() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed.map(normalizzaNc) : [];
      } catch {
        return [];
      }
    }

    function salvaArchivio() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(archivio));
    }

    function normalizzaNc(nc) {
      const base = {
        id: 0,
        titolo: "",
        stato: "Bozza",
        gravita: "",
        categoria: "",
        reparto: "",
        dataNc: "",
        oraNc: "",
        gestionePc: {
          contenimento: [],
          rootCause5M: { man: "", machine: "", method: "", material: "", measurement: "" },
          azioni: [],
          verifica: { verificatoDa: "", data: "", esito: "Da verificare", note: "" }
        }
      };
      const out = Object.assign(base, nc || {});
      if (!out.gestionePc || typeof out.gestionePc !== "object") out.gestionePc = {};
      if (!Array.isArray(out.gestionePc.contenimento)) out.gestionePc.contenimento = [];
      if (!out.gestionePc.rootCause5M || typeof out.gestionePc.rootCause5M !== "object") {
        out.gestionePc.rootCause5M = { man: "", machine: "", method: "", material: "", measurement: "" };
      }
      if (!Array.isArray(out.gestionePc.azioni)) out.gestionePc.azioni = [];
      if (!out.gestionePc.verifica || typeof out.gestionePc.verifica !== "object") {
        out.gestionePc.verifica = { verificatoDa: "", data: "", esito: "Da verificare", note: "" };
      }
      return out;
    }

    function badgeStatoHtml(stato) {
      return `<span class="badge stato-${escapeHtml(stato || "Bozza")}">${escapeHtml(stato || "Bozza")}</span>`;
    }

    function renderLista() {
      if (!archivio.length) {
        listaNcEl.innerHTML = `<div class="empty">Nessuna NC salvata.</div>`;
        return;
      }
      const ord = [...archivio].sort((a, b) => (b.id || 0) - (a.id || 0));
      listaNcEl.innerHTML = ord.map(nc => `
        <article class="nc-item ${selezionata && selezionata.id === nc.id ? "active" : ""}" data-id="${nc.id}" data-sev="${escapeHtml(nc.gravita || "")}">
          <h3>#NC-${String(nc.id).padStart(4, "0")} · ${escapeHtml(nc.titolo || "Senza titolo")}</h3>
          <div class="meta">
            ${badgeStatoHtml(nc.stato)}
            <span>${escapeHtml(nc.categoria || "-")}</span>
          </div>
          <div class="meta" style="margin-top:5px;">
            <span>${escapeHtml((nc.dataNc || "-") + " " + (nc.oraNc || ""))}</span>
          </div>
        </article>
      `).join("");

      listaNcEl.querySelectorAll(".nc-item").forEach(el => {
        el.addEventListener("click", () => {
          const id = Number(el.dataset.id);
          selezionata = archivio.find(x => x.id === id) || null;
          renderLista();
          renderDettaglio();
        });
      });
    }

    function renderDettaglio() {
      if (!selezionata) {
        titoloDettaglio.textContent = "Seleziona una NC";
        badgeStato.textContent = "";
        contentBody.innerHTML = `<div class="panel"><div class="empty">Seleziona una NC dalla barra laterale.</div></div>`;
        return;
      }

      selezionata = normalizzaNc(selezionata);
      titoloDettaglio.textContent = "#NC-" + String(selezionata.id).padStart(4, "0") + " · " + (selezionata.titolo || "Senza titolo");
      badgeStato.innerHTML = badgeStatoHtml(selezionata.stato);

      const g = selezionata.gestionePc;
      contentBody.innerHTML = `
        <section class="panel">
          <h3>Dati principali</h3>
          <div class="grid cols-3">
            <div>
              <label>Stato</label>
              <select id="fStato">
                <option ${selezionata.stato === "Bozza" ? "selected" : ""}>Bozza</option>
                <option ${selezionata.stato === "Aperta" ? "selected" : ""}>Aperta</option>
                <option ${selezionata.stato === "Inviata" ? "selected" : ""}>Inviata</option>
              </select>
            </div>
            <div>
              <label>Severità</label>
              <select id="fSeverita">
                <option ${selezionata.gravita === "Bassa" ? "selected" : ""}>Bassa</option>
                <option ${selezionata.gravita === "Media" ? "selected" : ""}>Media</option>
                <option ${selezionata.gravita === "Alta" ? "selected" : ""}>Alta</option>
                <option ${selezionata.gravita === "Critica" ? "selected" : ""}>Critica</option>
              </select>
            </div>
            <div>
              <label>Reparto</label>
              <input id="fReparto" value="${escapeHtml(selezionata.reparto || "")}">
            </div>
          </div>
        </section>

        <section class="panel">
          <h3>Azioni di contenimento</h3>
          <div id="contenimentoList"></div>
          <button class="btn secondary" id="aggiungiContenimento" type="button">+ Aggiungi contenimento</button>
        </section>

        <section class="panel">
          <h3>Root Cause - 5M</h3>
          <div class="grid cols-2">
            <div>
              <label>Man (Uomo)</label>
              <textarea id="mMan">${escapeHtml(g.rootCause5M.man || "")}</textarea>
            </div>
            <div>
              <label>Machine (Macchina)</label>
              <textarea id="mMachine">${escapeHtml(g.rootCause5M.machine || "")}</textarea>
            </div>
            <div>
              <label>Method (Metodo)</label>
              <textarea id="mMethod">${escapeHtml(g.rootCause5M.method || "")}</textarea>
            </div>
            <div>
              <label>Material (Materiale)</label>
              <textarea id="mMaterial">${escapeHtml(g.rootCause5M.material || "")}</textarea>
            </div>
            <div style="grid-column:1/-1;">
              <label>Measurement (Misurazione)</label>
              <textarea id="mMeasurement">${escapeHtml(g.rootCause5M.measurement || "")}</textarea>
            </div>
          </div>
        </section>

        <section class="panel">
          <h3>Azioni correttive / preventive</h3>
          <div id="azioniList"></div>
          <button class="btn secondary" id="aggiungiAzione" type="button">+ Aggiungi azione</button>
        </section>

        <section class="panel">
          <h3>Verifica efficacia</h3>
          <div class="grid cols-2">
            <div>
              <label>Verificato da</label>
              <input id="vDa" value="${escapeHtml(g.verifica.verificatoDa || "")}">
            </div>
            <div>
              <label>Data verifica</label>
              <input id="vData" type="date" value="${escapeHtml(g.verifica.data || "")}">
            </div>
            <div>
              <label>Esito</label>
              <select id="vEsito">
                <option ${g.verifica.esito === "Da verificare" ? "selected" : ""}>Da verificare</option>
                <option ${g.verifica.esito === "Efficace" ? "selected" : ""}>Efficace</option>
                <option ${g.verifica.esito === "Parziale" ? "selected" : ""}>Parziale</option>
                <option ${g.verifica.esito === "Non efficace" ? "selected" : ""}>Non efficace</option>
              </select>
            </div>
            <div>
              <label>Note verifica</label>
              <textarea id="vNote">${escapeHtml(g.verifica.note || "")}</textarea>
            </div>
          </div>
        </section>

        <section class="panel">
          <div id="msgSalvataggio" class="msg"></div>
          <div class="actions">
            <button class="btn success" id="salvaDettaglio">Salva gestione PC</button>
          </div>
        </section>

        <section class="panel">
          <h3>JSON NC selezionata</h3>
          <pre class="json" id="jsonNc"></pre>
        </section>
      `;

      renderContenimento();
      renderAzioni();
      aggiornaJsonNc();

      document.getElementById("aggiungiContenimento").addEventListener("click", () => {
        selezionata.gestionePc.contenimento.push({ tipo: "", descrizione: "", responsabile: "", scadenza: "" });
        renderContenimento();
        aggiornaJsonNc();
      });
      document.getElementById("aggiungiAzione").addEventListener("click", () => {
        selezionata.gestionePc.azioni.push({ azione: "", owner: "", scadenza: "", stato: "Aperta", note: "" });
        renderAzioni();
        aggiornaJsonNc();
      });
      document.getElementById("salvaDettaglio").addEventListener("click", salvaDettaglioPc);
    }

    function renderContenimento() {
      const wrap = document.getElementById("contenimentoList");
      const arr = selezionata.gestionePc.contenimento;
      if (!arr.length) {
        wrap.innerHTML = `<div class="empty" style="padding:10px;">Nessuna azione di contenimento.</div>`;
        return;
      }
      wrap.innerHTML = arr.map((c, i) => `
        <div class="row-item">
          <div class="row-head">
            <span>Contenimento ${i + 1}</span>
            <button class="btn danger" data-del-cont="${i}" type="button">Elimina</button>
          </div>
          <div class="grid cols-2">
            <div>
              <label>Tipo</label>
              <input data-cont-idx="${i}" data-cont-key="tipo" value="${escapeHtml(c.tipo || "")}">
            </div>
            <div>
              <label>Responsabile</label>
              <input data-cont-idx="${i}" data-cont-key="responsabile" value="${escapeHtml(c.responsabile || "")}">
            </div>
            <div style="grid-column:1/-1;">
              <label>Descrizione</label>
              <textarea data-cont-idx="${i}" data-cont-key="descrizione">${escapeHtml(c.descrizione || "")}</textarea>
            </div>
            <div>
              <label>Scadenza</label>
              <input type="date" data-cont-idx="${i}" data-cont-key="scadenza" value="${escapeHtml(c.scadenza || "")}">
            </div>
          </div>
        </div>
      `).join("");

      wrap.querySelectorAll("[data-cont-key]").forEach(el => {
        el.addEventListener("input", e => {
          const idx = Number(e.target.dataset.contIdx);
          const key = e.target.dataset.contKey;
          selezionata.gestionePc.contenimento[idx][key] = e.target.value;
          aggiornaJsonNc();
        });
      });
      wrap.querySelectorAll("[data-del-cont]").forEach(btn => {
        btn.addEventListener("click", e => {
          const idx = Number(e.target.dataset.delCont);
          selezionata.gestionePc.contenimento.splice(idx, 1);
          renderContenimento();
          aggiornaJsonNc();
        });
      });
    }

    function renderAzioni() {
      const wrap = document.getElementById("azioniList");
      const arr = selezionata.gestionePc.azioni;
      if (!arr.length) {
        wrap.innerHTML = `<div class="empty" style="padding:10px;">Nessuna azione definita.</div>`;
        return;
      }
      wrap.innerHTML = arr.map((a, i) => `
        <div class="row-item">
          <div class="row-head">
            <span>Azione ${i + 1}</span>
            <button class="btn danger" data-del-az="${i}" type="button">Elimina</button>
          </div>
          <div class="grid cols-2">
            <div style="grid-column:1/-1;">
              <label>Azione</label>
              <textarea data-az-idx="${i}" data-az-key="azione">${escapeHtml(a.azione || "")}</textarea>
            </div>
            <div>
              <label>Owner</label>
              <input data-az-idx="${i}" data-az-key="owner" value="${escapeHtml(a.owner || "")}">
            </div>
            <div>
              <label>Scadenza</label>
              <input type="date" data-az-idx="${i}" data-az-key="scadenza" value="${escapeHtml(a.scadenza || "")}">
            </div>
            <div>
              <label>Stato</label>
              <select data-az-idx="${i}" data-az-key="stato">
                <option ${a.stato === "Aperta" ? "selected" : ""}>Aperta</option>
                <option ${a.stato === "In corso" ? "selected" : ""}>In corso</option>
                <option ${a.stato === "Chiusa" ? "selected" : ""}>Chiusa</option>
              </select>
            </div>
            <div style="grid-column:1/-1;">
              <label>Note</label>
              <input data-az-idx="${i}" data-az-key="note" value="${escapeHtml(a.note || "")}">
            </div>
          </div>
        </div>
      `).join("");

      wrap.querySelectorAll("[data-az-key]").forEach(el => {
        el.addEventListener("input", e => {
          const idx = Number(e.target.dataset.azIdx);
          const key = e.target.dataset.azKey;
          selezionata.gestionePc.azioni[idx][key] = e.target.value;
          aggiornaJsonNc();
        });
      });
      wrap.querySelectorAll("[data-del-az]").forEach(btn => {
        btn.addEventListener("click", e => {
          const idx = Number(e.target.dataset.delAz);
          selezionata.gestionePc.azioni.splice(idx, 1);
          renderAzioni();
          aggiornaJsonNc();
        });
      });
    }

    function salvaDettaglioPc() {
      if (!selezionata) return;
      selezionata.stato = document.getElementById("fStato").value;
      selezionata.gravita = document.getElementById("fSeverita").value;
      selezionata.reparto = document.getElementById("fReparto").value;

      selezionata.gestionePc.rootCause5M.man = document.getElementById("mMan").value;
      selezionata.gestionePc.rootCause5M.machine = document.getElementById("mMachine").value;
      selezionata.gestionePc.rootCause5M.method = document.getElementById("mMethod").value;
      selezionata.gestionePc.rootCause5M.material = document.getElementById("mMaterial").value;
      selezionata.gestionePc.rootCause5M.measurement = document.getElementById("mMeasurement").value;

      selezionata.gestionePc.verifica.verificatoDa = document.getElementById("vDa").value;
      selezionata.gestionePc.verifica.data = document.getElementById("vData").value;
      selezionata.gestionePc.verifica.esito = document.getElementById("vEsito").value;
      selezionata.gestionePc.verifica.note = document.getElementById("vNote").value;

      const idx = archivio.findIndex(x => x.id === selezionata.id);
      if (idx !== -1) archivio[idx] = normalizzaNc(JSON.parse(JSON.stringify(selezionata)));
      salvaArchivio();
      renderLista();
      aggiornaJsonNc();
      badgeStato.innerHTML = badgeStatoHtml(selezionata.stato);

      const msg = document.getElementById("msgSalvataggio");
      msg.className = "msg ok";
      msg.textContent = "Informazioni PC salvate correttamente.";
      setTimeout(() => {
        msg.className = "msg";
        msg.textContent = "";
      }, 2200);
    }

    function aggiornaJsonNc() {
      const el = document.getElementById("jsonNc");
      if (!el || !selezionata) return;
      el.textContent = JSON.stringify(selezionata, null, 2);
    }

    function inizializza() {
      archivio = leggiArchivio();
      selezionata = null;
      renderLista();
      renderDettaglio();
    }

    document.getElementById("btnVisualizza").addEventListener("click", inizializza);
    document.getElementById("btnRicarica").addEventListener("click", inizializza);
    inizializza();
  </script>
</body>
</html>
