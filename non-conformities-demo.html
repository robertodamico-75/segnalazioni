<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QDA-QSW Track</title>
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="QDA-QSW Track">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    :root {
      --bg: #edf2f8;
      --surface: #ffffff;
      --text: #122235;
      --muted: #607087;
      --line: #d8e1ec;
      --primary: #0a63d8;
      --primary-dark: #084da6;
      --danger: #c82828;
      --ok: #1c8a4b;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI Variable Display", "Aptos", "SF Pro Display", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 5%, #d4e6ff 0%, transparent 34%),
        radial-gradient(circle at 90% 95%, #d2f0de 0%, transparent 28%),
        var(--bg);
      padding: 16px;
    }
    .phone {
      width: 100%;
      max-width: 430px;
      height: min(900px, 96vh);
      border: 10px solid #111926;
      border-radius: 28px;
      overflow: hidden;
      background: #f7f9fc;
      box-shadow: 0 24px 40px rgba(10, 20, 35, 0.35);
      position: relative;
    }
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 46%;
      height: 22px;
      border-radius: 0 0 12px 12px;
      background: #111926;
      z-index: 3;
    }
    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #f8fbff 0%, #edf3f9 100%);
    }
    .header {
      position: sticky;
      top: 0;
      z-index: 2;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      padding: 28px 14px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }
    .header-center { display: flex; flex-direction: column; min-width: 0; flex: 1; padding: 0 6px; }
    .btn.back { min-width: 42px; width: 42px; height: 42px; padding: 0; font-size: 1.2rem; font-weight: 800; border-radius: 10px; }
    .title { margin: 0; font-size: 1.02rem; font-weight: 750; }
    .sub { margin: 2px 0 0; color: var(--muted); font-size: 0.76rem; }
    .logo-box {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      border: 1px solid #d8e1ec;
      background: linear-gradient(135deg, #1fa85b, #157c43);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      display: grid;
      place-items: center;
    }
    .view { flex: 1; overflow: auto; padding: 14px 14px 142px; }
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; }
    .panel h2 { margin: 0 0 10px; font-size: 0.88rem; color: #19314e; }
    .btn { border: 0; border-radius: 12px; padding: 12px 14px; font-size: 0.92rem; font-weight: 700; cursor: pointer; }
    .btn.primary { color: #fff; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
    .btn.secondary { color: #15324f; background: #e8eef7; }
    .btn.danger { color: #8c1c1c; background: #ffe9e9; }
    .btn.block { width: 100%; }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .grid { display: grid; gap: 9px; }
    .cols-2 { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    .date-time-row { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
    .menu-buttons { display: grid; gap: 10px; margin-top: 8px; }
    .brand-title {
      font-size: 1.12rem;
      font-weight: 900;
      color: #12385f;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }
    .brand-logos { display: grid; gap: 8px; }
    .logo-chip {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
    }
    .logo-chip.asi {
      background: linear-gradient(135deg, #fff8ef, #ffe9d0);
      color: #6a3a00;
      border-color: #f1d4ab;
    }
    .logo-chip.alpac {
      background: linear-gradient(135deg, #ebf6ff, #d9ecff);
      color: #0a4ea6;
      border-color: #c0dafb;
    }
    .logo-chip img {
      max-width: 100%;
      max-height: 34px;
      object-fit: contain;
      display: block;
    }
    .icon-btn {
      width: 44px;
      min-width: 44px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 1.15rem;
      line-height: 1;
      flex: 0 0 auto !important;
    }
    .save-btn-big {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      font-size: 1.6rem;
      justify-self: center;
    }
    label { display: block; margin-bottom: 4px; font-size: 0.75rem; color: #3d536f; font-weight: 650; }
    input, select, textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid #cdd8e5;
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      color: #122235;
      background: #fff;
      font-size: 0.9rem;
    }
    input[type="date"], input[type="time"] {
      appearance: none;
      -webkit-appearance: none;
      max-width: 100%;
      overflow: hidden;
    }
    .date-time-row > * { min-width: 0; }
    textarea { min-height: 80px; resize: vertical; }
    .required-field { background: #fff8bf; border-color: #dccb67; }
    .inline { display: flex; gap: 8px; }
    .inline .btn { flex: 1; }
    .inline.tight .btn { flex: 0 0 auto; }
    .inline.tight input { flex: 1 1 auto; }
    .images { margin-top: 8px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .img-item { border: 1px solid var(--line); border-radius: 10px; background: #f6f9fd; overflow: hidden; position: relative; min-height: 84px; }
    .img-item img { width: 100%; height: 84px; object-fit: cover; display: block; }
    .img-item button {
      position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
      border: 0; border-radius: 50%; color: #fff; background: rgba(200, 40, 40, 0.95); cursor: pointer;
    }
    .obs { border: 1px solid var(--line); border-radius: 10px; background: #f9fcff; padding: 9px; margin-bottom: 8px; }
    .obs-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.79rem; font-weight: 700; color: #3e5672; }
    .cards { display: grid; gap: 10px; }
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-left: 5px solid #b6c5d7;
      border-radius: var(--radius);
      padding: 10px;
      cursor: pointer;
    }
    .card[data-sev="Critica"] { border-left-color: var(--danger); }
    .card.selected { border-color: #1a7f49; box-shadow: 0 0 0 2px rgba(26, 127, 73, 0.2); }
    .card h3 { margin: 0 0 7px; font-size: 0.94rem; }
    .meta { font-size: 0.78rem; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { border-radius: 999px; padding: 2px 8px; font-size: 0.72rem; font-weight: 700; border: 1px solid transparent; }
    .stato-Bozza { background: #f1f2f4; color: #47515e; border-color: #dce0e5; }
    .stato-Aperta { background: #e8f0fe; color: #0a4ea6; border-color: #c7dafb; }
    .stato-Inviata { background: #e7f8ee; color: #197e43; border-color: #c6edd6; }
    .footer-actions {
      position: static;
      display: grid;
      gap: 8px;
      background: transparent;
      padding: 8px 0 2px;
      margin-top: 6px;
    }
    .alert { margin-bottom: 10px; border-radius: 10px; padding: 8px 10px; font-size: 0.82rem; }
    .alert.error { background: #ffe9e9; color: #952020; border: 1px solid #f0c6c6; }
    .alert.ok { background: #e6f7ed; color: #187840; border: 1px solid #c3ebd4; }
    .toast-fixed {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: calc(96px + env(safe-area-inset-bottom));
      z-index: 30;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.86rem;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(12, 22, 34, 0.25);
      pointer-events: none;
    }
    .toast-fixed.error { background: #ffe9e9; color: #952020; border: 1px solid #f0c6c6; }
    .toast-fixed.ok { background: #e6f7ed; color: #187840; border: 1px solid #c3ebd4; }
    .icon-svg {
      width: 22px;
      height: 22px;
      display: block;
      fill: currentColor;
    }
    .save-btn-big .icon-svg {
      width: 26px;
      height: 26px;
    }
    .empty { padding: 14px; border: 1px dashed #cad7e5; border-radius: 12px; color: var(--muted); text-align: center; font-size: 0.85rem; }
    @media (max-width: 460px) {
      body { padding: 0; }
      .phone { width: 100vw; height: 100vh; border: 0; border-radius: 0; max-width: none; }
      .notch { display: none; }
      .header { padding-top: 16px; }
      .cols-2, .date-time-row { grid-template-columns: 1fr; }
      input, select, textarea { font-size: 16px; }
      .view { padding-bottom: 154px; }
      .toast-fixed { bottom: calc(108px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div id="root" class="app"></div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const APP_VERSION = "v2026.03.13.28-react";
    const GITHUB_TOKEN_KEY = "qda_qsw_github_token_v1";
    const archivioFissoPath = "https://robertodamico-75.github.io/segnalazioni/nc-archivio.json";
    const archivioFallbackPath = "./nc-archivio.json";
    const archivioFissoNome = "nc-archivio.json";
    const githubRepoOwner = "robertodamico-75";
    const githubRepoName = "segnalazioni";
    const githubRepoBranch = "main";
    const githubRepoPath = "nc-archivio.json";
    const obbligatori = ["titolo","descrizione","categoria","gravita","reparto","operatore","dataNc","oraNc","riferimento"];

    const oraAttuale = () => new Date().toTimeString().slice(0, 5);
    const dataAttuale = () => new Date().toISOString().slice(0, 10);

    function modelloVuoto(nextId) {
      return { id: nextId, titolo: "", descrizione: "", categoria: "", gravita: "", reparto: "", luogo: "", operatore: "", stato: "Bozza", dataNc: dataAttuale(), oraNc: oraAttuale(), riferimento: "", note: "", gpsCoord: "", osservazioni: [], immagini: [] };
    }
    function normalizzaNc(nc) {
      const out = Object.assign(modelloVuoto(null), nc || {});
      out.id = Number(out.id) || null;
      out.osservazioni = Array.isArray(out.osservazioni) ? out.osservazioni : [];
      out.immagini = Array.isArray(out.immagini) ? out.immagini : [];
      out.gpsCoord = typeof out.gpsCoord === "string" ? out.gpsCoord : "";
      return out;
    }
    function normalizzaArchivio(parsed) {
      if (!parsed) return {};
      const out = {};
      const prossimoIdLocale = () => {
        const keys = Object.keys(out).map(k => Number(k)).filter(Number.isFinite);
        return (keys.length ? Math.max(...keys) : 0) + 1;
      };
      if (Array.isArray(parsed)) {
        parsed.forEach(item => {
          const nc = normalizzaNc(item);
          let id = nc.id || prossimoIdLocale();
          if (out[String(id)]) id = prossimoIdLocale();
          nc.id = id;
          out[String(id)] = nc;
        });
        return out;
      }
      if (typeof parsed === "object") {
        Object.keys(parsed).forEach(key => {
          const nc = normalizzaNc(parsed[key]);
          let id = nc.id || Number(key) || prossimoIdLocale();
          if (out[String(id)]) id = prossimoIdLocale();
          nc.id = id;
          out[String(id)] = nc;
        });
      }
      return out;
    }
    function serializzaArchivio(archivio) {
      const ordered = {};
      Object.keys(archivio || {}).sort((a, b) => Number(a) - Number(b)).forEach(k => { ordered[k] = archivio[k]; });
      return JSON.stringify(ordered, null, 2);
    }
    function prossimoId(archivio) {
      return Object.values(archivio || {}).reduce((max, x) => Math.max(max, Number(x.id) || 0), 0) + 1;
    }
    function validaBozza(bozza) {
      return obbligatori.filter(c => !String(bozza[c] || "").trim());
    }
    function base64Utf8(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    function App() {
      const LOGO_ASI = [];
      const LOGO_ALPAC = [];

      const inputArchivioRef = useRef(null);
      const inputFotoRef = useRef(null);
      const inputUploadRef = useRef(null);
      const fileHandleRef = useRef(null);

      const [vista, setVista] = useState("menu");
      const [archivio, setArchivio] = useState({});
      const [bozza, setBozza] = useState(() => modelloVuoto(1));
      const [ncSelezionataId, setNcSelezionataId] = useState(null);
      const [nomeArchivio, setNomeArchivio] = useState(archivioFissoNome);
      const [alert, setAlert] = useState({ tipo: "", msg: "" });
      const [sorgenteArchivio, setSorgenteArchivio] = useState("-");
      const [githubSyncAt, setGithubSyncAt] = useState("");
      const [githubTokenSet, setGithubTokenSet] = useState(() => !!(localStorage.getItem(GITHUB_TOKEN_KEY) || "").trim());

      const elencoNc = useMemo(() => Object.values(archivio).sort((a, b) => b.id - a.id), [archivio]);

      useEffect(() => {
        const caricaArchivioFisso = async () => {
          try {
            const resp = await fetch(archivioFissoPath + "?t=" + Date.now(), { cache: "no-store" });
            if (!resp.ok) throw new Error("HTTP " + resp.status);
            const testo = await resp.text();
            const loaded = normalizzaArchivio(JSON.parse((testo || "{}").trim() || "{}"));
            setArchivio(loaded);
            setSorgenteArchivio(archivioFissoPath);
            return;
          } catch (errRemote) {
            try {
              const respLocal = await fetch(archivioFallbackPath + "?t=" + Date.now(), { cache: "no-store" });
              if (!respLocal.ok) throw new Error("HTTP " + respLocal.status);
              const testoLocal = await respLocal.text();
              const loadedLocal = normalizzaArchivio(JSON.parse((testoLocal || "{}").trim() || "{}"));
              setArchivio(loadedLocal);
              setSorgenteArchivio(archivioFallbackPath);
              setAlert({ tipo: "error", msg: "Remoto non disponibile, uso file locale." });
            } catch (errLocal) {
              setAlert({ tipo: "error", msg: "Errore caricamento Database: " + String(errRemote?.message || errLocal?.message || "sorgente non raggiungibile") });
            }
          }
        };
        caricaArchivioFisso();
      }, []);
      useEffect(() => {
        if (!alert.msg) return;
        const timer = setTimeout(() => {
          setAlert({ tipo: "", msg: "" });
        }, 2600);
        return () => clearTimeout(timer);
      }, [alert.msg]);
      useEffect(() => {
        if (vista !== "crea" && alert.msg) {
          setAlert({ tipo: "", msg: "" });
        }
      }, [vista]);

      const salvaArchivio = async (nextArchivio) => {
        const json = serializzaArchivio(nextArchivio);
        if (fileHandleRef.current && window.showSaveFilePicker) {
          const writable = await fileHandleRef.current.createWritable();
          await writable.write(json);
          await writable.close();
        }
        let githubOk = false;
        let githubError = "";
        const token = (localStorage.getItem(GITHUB_TOKEN_KEY) || "").trim();
        if (token) {
          try {
            await pubblicaSuGitHub(nextArchivio, token);
            setGithubSyncAt(new Date().toLocaleString("it-IT"));
            githubOk = true;
          } catch (err) {
            githubError = String(err?.message || "Pubblicazione Ambiente Demo ASI fallita.");
          }
        }
        return { githubOk, githubError, hadToken: !!token };
      };

      const githubApiUrl = `https://api.github.com/repos/${githubRepoOwner}/${githubRepoName}/contents/${githubRepoPath}`;

      const pubblicaSuGitHub = async (archivioDaPubblicare, token) => {
        if (!token) throw new Error("Token GitHub mancante.");
        const headers = {
          "Accept": "application/vnd.github+json",
          "Authorization": "Bearer " + token,
          "X-GitHub-Api-Version": "2022-11-28"
        };

        const leggiShaCorrente = async () => {
          const getResp = await fetch(githubApiUrl + "?ref=" + encodeURIComponent(githubRepoBranch), { headers });
          if (getResp.ok) {
            const current = await getResp.json();
            return current && current.sha ? current.sha : undefined;
          }
          if (getResp.status !== 404) {
            throw new Error("Lettura file Ambiente Demo ASI fallita (HTTP " + getResp.status + ").");
          }
          return undefined;
        };

        const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
        let lastErr = "";

        for (let attempt = 1; attempt <= 5; attempt++) {
          const sha = await leggiShaCorrente();
          const body = {
            message: "Aggiornamento NC da non-conformities-demo",
            content: base64Utf8(serializzaArchivio(archivioDaPubblicare)),
            branch: githubRepoBranch
          };
          if (sha) body.sha = sha;

          const putResp = await fetch(githubApiUrl, {
            method: "PUT",
            headers: { ...headers, "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          if (putResp.ok) return;

          const txt = await putResp.text();
          const isShaMismatch = putResp.status === 409 && (txt.includes("does not match") || txt.includes("\"sha\""));
          lastErr = "HTTP " + putResp.status + ": " + txt.slice(0, 180);
          if (!isShaMismatch) {
            throw new Error("Scrittura Ambiente Demo ASI fallita (" + lastErr + ")");
          }
          await wait(180 * attempt);
        }

        throw new Error("Scrittura Ambiente Demo ASI retry fallita dopo 5 tentativi: " + lastErr);
      };

      const configuraTokenGitHub = () => {
        const attuale = (localStorage.getItem(GITHUB_TOKEN_KEY) || "").trim();
        const input = prompt("Inserisci token Ambiente Demo ASI (repo:contents write). Lascia vuoto per rimuovere.", attuale);
        if (input === null) return;
        const token = String(input || "").trim();
        if (!token) {
          localStorage.removeItem(GITHUB_TOKEN_KEY);
          setGithubTokenSet(false);
          return mostraAlert("ok", "Token Ambiente Demo ASI rimosso.");
        }
        localStorage.setItem(GITHUB_TOKEN_KEY, token);
        setGithubTokenSet(true);
        mostraAlert("ok", "Token Ambiente Demo ASI salvato su questo dispositivo.");
      };

      const pubblicaArchivioAdesso = async () => {
        try {
          const token = (localStorage.getItem(GITHUB_TOKEN_KEY) || "").trim();
          if (!token) return mostraAlert("error", "Configura prima il token Ambiente Demo ASI.");
          await pubblicaSuGitHub(archivio, token);
          const when = new Date().toLocaleString("it-IT");
          setGithubSyncAt(when);
          mostraAlert("ok", "Database pubblicato su Ambiente Demo ASI.");
        } catch (err) {
          mostraAlert("error", String(err?.message || "Pubblicazione Ambiente Demo ASI non riuscita."));
        }
      };

      const mostraAlert = (tipo, msg) => setAlert({ tipo, msg });
      const gestisciFallbackLogo = (e, candidates) => {
        const current = e.currentTarget.getAttribute("src") || "";
        const idx = candidates.indexOf(current);
        const next = candidates[idx + 1];
        if (next) {
          e.currentTarget.setAttribute("src", next);
          return;
        }
        e.currentTarget.style.display = "none";
        if (e.currentTarget.nextElementSibling) {
          e.currentTarget.nextElementSibling.style.display = "block";
        }
      };
      const apriCrea = () => { setBozza(modelloVuoto(prossimoId(archivio))); setAlert({ tipo: "", msg: "" }); setVista("crea"); };

      const upsertBozza = async (ncAggiornata) => {
        const id = Number(ncAggiornata.id) || prossimoId(archivio);
        const chiave = String(id);
        const nextArchivio = { ...archivio, [chiave]: { ...ncAggiornata, id } };
        setArchivio(nextArchivio);
        return await salvaArchivio(nextArchivio);
      };

      const onSalva = async () => {
        const mancanti = validaBozza(bozza);
        if (mancanti.length) return mostraAlert("error", "Compila i campi obbligatori: " + mancanti.join(", "));
        const res = await upsertBozza({ ...bozza });
        if (res?.hadToken && !res?.githubOk) return mostraAlert("error", "NC salvata in locale, ma Ambiente Demo ASI NON aggiornato: " + res.githubError);
        if (!res?.hadToken) return mostraAlert("ok", "NC salvata in locale. Configura token Ambiente Demo ASI per pubblicare online.");
        mostraAlert("ok", "NC salvata su Database (Ambiente Demo ASI aggiornato).");
      };
      const onSubmit = async () => {
        const mancanti = validaBozza(bozza);
        if (mancanti.length) return mostraAlert("error", "Compila i campi obbligatori: " + mancanti.join(", "));
        if (!confirm("Confermi il submit della NC?")) return;
        const inviata = { ...bozza, stato: "Inviata" };
        setBozza(inviata);
        const res = await upsertBozza(inviata);
        if (res?.hadToken && !res?.githubOk) return mostraAlert("error", "NC inviata in locale, ma Ambiente Demo ASI NON aggiornato: " + res.githubError);
        if (!res?.hadToken) return mostraAlert("ok", "NC inviata in locale. Configura token Ambiente Demo ASI per pubblicare online.");
        mostraAlert("ok", "NC inviata e salvata su Database (Ambiente Demo ASI aggiornato).");
        setVista("menu");
      };

      const apriArchivioDaPicker = async () => {
        try {
          if (window.showOpenFilePicker) {
            const [handle] = await window.showOpenFilePicker({ multiple: false, types: [{ description: "JSON", accept: { "application/json": [".json"] } }] });
            if (!handle) return;
            if ((handle.name || "").toLowerCase() !== archivioFissoNome.toLowerCase()) return mostraAlert("error", "Seleziona il file " + archivioFissoNome + ".");
            fileHandleRef.current = handle;
            setNomeArchivio(archivioFissoNome);
            const file = await handle.getFile();
            const testo = await file.text();
            const loaded = normalizzaArchivio(JSON.parse(testo || "{}"));
            setArchivio(loaded);
            await salvaArchivio(loaded);
            mostraAlert("ok", "Database caricato.");
            return;
          }
          inputArchivioRef.current?.click();
        } catch {
          mostraAlert("error", "Impossibile aprire Database.");
        }
      };

      const creaOCollegaArchivio = async () => {
        try {
          if (!window.showSaveFilePicker) return mostraAlert("error", "Browser non supporta il collegamento diretto file.");
          const handle = await window.showSaveFilePicker({ suggestedName: archivioFissoNome, types: [{ description: "JSON", accept: { "application/json": [".json"] } }] });
          if (!handle) return;
          if ((handle.name || "").toLowerCase() !== archivioFissoNome.toLowerCase()) return mostraAlert("error", "Usa il nome file " + archivioFissoNome + ".");
          fileHandleRef.current = handle;
          setNomeArchivio(archivioFissoNome);
          await salvaArchivio(archivio);
          mostraAlert("ok", "Database collegato.");
        } catch {
          mostraAlert("error", "Impossibile creare/collegare Database.");
        }
      };

      const onImportFile = async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        try {
          if ((file.name || "").toLowerCase() !== archivioFissoNome.toLowerCase()) return mostraAlert("error", "Importa il file " + archivioFissoNome + ".");
          const testo = await file.text();
          const loaded = normalizzaArchivio(JSON.parse(testo || "{}"));
          setNomeArchivio(archivioFissoNome);
          setArchivio(loaded);
          await salvaArchivio(loaded);
          mostraAlert("ok", "Database importato.");
        } catch {
          mostraAlert("error", "File JSON non valido.");
        } finally {
          e.target.value = "";
        }
      };

      const esportaJson = () => {
        const blob = new Blob([serializzaArchivio(archivio)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = nomeArchivio || archivioFissoNome;
        a.click();
        URL.revokeObjectURL(url);
      };

      const aggiungiFile = async (fileList) => {
        const files = Array.from(fileList || []).filter(f => String(f.type || "").startsWith("image/"));
        const letti = await Promise.all(files.map(file => new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = ev => resolve({ id: "img_" + Date.now() + "_" + Math.random().toString(16).slice(2), nome: file.name || "immagine", src: ev.target.result });
          reader.readAsDataURL(file);
        })));
        setBozza(prev => ({ ...prev, immagini: [...prev.immagini, ...letti] }));
      };

      const acquisisciPosizione = () => {
        if (!window.isSecureContext) return mostraAlert("error", "Posizione disponibile solo in contesto sicuro (https o localhost).");
        if (!("geolocation" in navigator)) return mostraAlert("error", "Geolocalizzazione non supportata su questo dispositivo.");
        mostraAlert("ok", "Richiesta posizione in corso...");
        navigator.geolocation.getCurrentPosition(
          pos => {
            const lat = pos.coords.latitude.toFixed(6);
            const lon = pos.coords.longitude.toFixed(6);
            setBozza(prev => ({ ...prev, gpsCoord: lat + ", " + lon }));
            mostraAlert("ok", "Posizione GPS acquisita.");
          },
          () => mostraAlert("error", "Impossibile acquisire la posizione GPS."),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      };
      const acquisisciIndirizzo = async () => {
        try {
          if (!window.isSecureContext) return mostraAlert("error", "Posizione disponibile solo in contesto sicuro (https o localhost).");
          mostraAlert("ok", "Ricerca posizione/indirizzo in corso...");
          const pos = await new Promise((resolve, reject) => {
            if (!("geolocation" in navigator)) return reject(new Error("No geo"));
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 });
          });
          const lat = pos.coords.latitude.toFixed(6);
          const lon = pos.coords.longitude.toFixed(6);
          let indirizzo = "";
          try {
            const url = "https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=" + lat + "&lon=" + lon + "&addressdetails=1";
            const resp = await fetch(url, { headers: { "Accept": "application/json" } });
            if (resp.ok) {
              const data = await resp.json();
              const a = data.address || {};
              const via = a.road || a.pedestrian || a.footway || a.path || "";
              const civico = a.house_number || "";
              const citta = a.city || a.town || a.village || a.municipality || "";
              const cap = a.postcode || "";
              const provincia = a.county || a.state_district || "";
              const regione = a.state || "";
              const paese = a.country || "";
              const viaCompleta = [via, civico].filter(Boolean).join(" ").trim();
              indirizzo = [viaCompleta, citta, cap, provincia, regione, paese].filter(Boolean).join(", ");
              if (!indirizzo && data.display_name) indirizzo = String(data.display_name);
            }
          } catch {}
          setBozza(prev => ({ ...prev, gpsCoord: lat + ", " + lon, luogo: indirizzo || (lat + ", " + lon) }));
          mostraAlert("ok", indirizzo ? "Indirizzo caricato da posizione." : "Posizione acquisita, indirizzo non disponibile.");
        } catch {
          mostraAlert("error", "Impossibile acquisire posizione/indirizzo.");
        }
      };

      const sottotitolo = vista === "menu" ? "Demo mobile non conformita installazioni foro finestra" : (vista === "crea" ? "Raccogli problema, foto, operatore, ordini e posizione" : "Elenco NC salvate");
      const statoClasse = s => ("badge stato-" + (s || "Bozza")).replace(/\\s+/g, "-");

      return (
        <>
          <header className="header">
            <button className="btn secondary back" style={{ display: vista === "menu" ? "none" : "inline-block" }} onClick={() => setVista("menu")} aria-label="Indietro" title="Indietro">{"<"}</button>
            <div className="header-center">
              <h1 className="title">{vista === "menu" ? "Menu" : vista === "crea" ? "Crea NC" : "Visualizza NC"}</h1>
              <p className="sub">{sottotitolo + " • " + APP_VERSION}</p>
            </div>
            <div className="logo-box">QSW</div>
          </header>

          <main className="view">
            {vista === "menu" && (
              <>
                <section className="panel">
                  <div className="brand-title">QDA-QSW Track</div>
                  <div className="brand-logos">
                    <div className="logo-chip asi"><span>ASI DataMyte Italia</span></div>
                    <div className="logo-chip alpac"><span>ALPAC</span></div>
                  </div>
                </section>
                <section className="panel">
                  <h2>Seleziona azione</h2>
                  <div className="menu-buttons">
                    <button className="btn primary block" onClick={apriCrea}>➕ Crea NC</button>
                    <button className="btn secondary block" onClick={() => setVista("visualizza")}>👁 Visualizza</button>
                  </div>
                </section>
                <section className="panel">
                  <h2>Database</h2>
                  <div className="menu-buttons">
                    <button className="btn secondary block" onClick={apriArchivioDaPicker}>Apri Database</button>
                    <button className="btn secondary block" onClick={creaOCollegaArchivio}>Crea / collega Database</button>
                    <button className="btn secondary block" onClick={configuraTokenGitHub}>Configura token Ambiente Demo ASI</button>
                    <button className="btn primary block" onClick={pubblicaArchivioAdesso}>Pubblica su Ambiente Demo ASI</button>
                  </div>
                  <input ref={inputArchivioRef} type="file" accept="application/json,.json" hidden onChange={onImportFile} />
                  <div style={{ fontSize: "0.8rem", color: "#4f6278", marginTop: "8px", wordBreak: "break-all" }}>Database: {sorgenteArchivio}</div>
                  <div style={{ fontSize: "0.8rem", color: "#4f6278", marginTop: "4px" }}>Sync Ambiente Demo ASI: {githubSyncAt || "non eseguita"}</div>
                  <div style={{ fontSize: "0.8rem", color: "#4f6278", marginTop: "4px" }}>Token Ambiente Demo ASI: {githubTokenSet ? "configurato" : "mancante"}</div>
                </section>
              </>
            )}

            {vista === "crea" && (
              <>
                {alert.msg && <div className={"alert " + (alert.tipo === "ok" ? "ok" : "error")}>{alert.msg}</div>}
                <section className="panel">
                  <h2>Dati non conformita installazione</h2>
                  <div className="grid">
                    <div><label>Problema riscontrato *</label><input className="required-field" value={bozza.titolo} onChange={e => setBozza({ ...bozza, titolo: e.target.value })} /></div>
                    <div><label>Descrizione tecnica problema *</label><textarea className="required-field" value={bozza.descrizione} onChange={e => setBozza({ ...bozza, descrizione: e.target.value })} /></div>
                  </div>
                  <div className="grid cols-2" style={{ marginTop: "8px" }}>
                    <div><label>Famiglia prodotto ALPAC *</label><select className="required-field" value={bozza.categoria} onChange={e => setBozza({ ...bozza, categoria: e.target.value })}><option value="">Seleziona</option><option>Sistemi posa</option><option>Monoblocco</option><option>Controtelaio</option><option>Cassonetto</option><option>Altro</option></select></div>
                    <div><label>Severita *</label><select className="required-field" value={bozza.gravita} onChange={e => setBozza({ ...bozza, gravita: e.target.value })}><option value="">Seleziona</option><option>Bassa</option><option>Media</option><option>Alta</option><option>Critica</option></select></div>
                    <div><label>Cantiere / Cliente *</label><input className="required-field" value={bozza.reparto} onChange={e => setBozza({ ...bozza, reparto: e.target.value })} /></div>
                    <div><label>Posizione geografica (indirizzo) *</label><div className="inline tight"><input value={bozza.luogo} onChange={e => setBozza({ ...bozza, luogo: e.target.value })} /><button className="btn secondary icon-btn" type="button" onClick={(e) => { e.preventDefault(); acquisisciIndirizzo(); }} title="Carica via/citta" aria-label="Carica via citta"><svg className="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 0-7 7c0 4.7 5.5 11.2 6.1 11.9a1.2 1.2 0 0 0 1.8 0C13.5 20.2 19 13.7 19 9a7 7 0 0 0-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/></svg></button></div></div>
                    <div><label>Operatore / Segnalatore *</label><input className="required-field" value={bozza.operatore} onChange={e => setBozza({ ...bozza, operatore: e.target.value })} /></div>
                    <div><label>Stato pratica</label><select value={bozza.stato} onChange={e => setBozza({ ...bozza, stato: e.target.value })}><option>Bozza</option><option>Aperta</option><option>Inviata</option></select></div>
                  </div>
                  <div className="grid date-time-row" style={{ marginTop: "8px" }}>
                    <div><label>Data *</label><input className="required-field" type="date" value={bozza.dataNc} onChange={e => setBozza({ ...bozza, dataNc: e.target.value })} /></div>
                    <div><label>Ora *</label><input className="required-field" type="time" value={bozza.oraNc} onChange={e => setBozza({ ...bozza, oraNc: e.target.value })} /></div>
                  </div>
                  <div style={{ marginTop: "8px" }}><label>Numero ordine / commessa *</label><input className="required-field" value={bozza.riferimento} onChange={e => setBozza({ ...bozza, riferimento: e.target.value })} /></div>
                  <div style={{ marginTop: "8px" }}><label>Coordinate GPS</label><div className="inline"><input value={bozza.gpsCoord} readOnly /><button className="btn secondary icon-btn" type="button" onClick={(e) => { e.preventDefault(); acquisisciPosizione(); }} title="Usa posizione attuale" aria-label="Usa posizione attuale"><svg className="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 2h2v3.1A7 7 0 0 1 18.9 11H22v2h-3.1A7 7 0 0 1 13 18.9V22h-2v-3.1A7 7 0 0 1 5.1 13H2v-2h3.1A7 7 0 0 1 11 5.1V2zm1 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/></svg></button></div></div>
                  <div style={{ marginTop: "8px" }}><label>Note aggiuntive</label><textarea value={bozza.note} onChange={e => setBozza({ ...bozza, note: e.target.value })} /></div>
                </section>

                <section className="panel">
                  <h2>Foto del problema</h2>
                  <div className="inline">
                    <button className="btn secondary" type="button" onClick={() => inputFotoRef.current?.click()}>Scatta foto</button>
                    <button className="btn secondary" type="button" onClick={() => inputUploadRef.current?.click()}>Carica immagine</button>
                  </div>
                  <input ref={inputFotoRef} type="file" accept="image/*" capture="environment" hidden onChange={e => aggiungiFile(e.target.files)} />
                  <input ref={inputUploadRef} type="file" accept="image/*" multiple hidden onChange={e => aggiungiFile(e.target.files)} />
                  <div className="images">
                    {!bozza.immagini.length && <div className="empty" style={{ gridColumn: "1/-1", padding: "10px" }}>Nessuna immagine.</div>}
                    {bozza.immagini.map((img, i) => <div className="img-item" key={img.id || i}><img src={img.src} alt={"img-" + i} /><button type="button" onClick={() => setBozza(prev => ({ ...prev, immagini: prev.immagini.filter((_, idx) => idx !== i) }))}>x</button></div>)}
                  </div>
                </section>

                <section className="panel">
                  <h2>Osservazioni aggiuntive</h2>
                  {!bozza.osservazioni.length && <div className="empty" style={{ padding: "10px" }}>Nessuna osservazione.</div>}
                  {bozza.osservazioni.map((o, i) => (
                    <div className="obs" key={i}>
                      <div className="obs-head"><span>Osservazione {i + 1}</span><button className="btn danger" type="button" onClick={() => setBozza(prev => ({ ...prev, osservazioni: prev.osservazioni.filter((_, idx) => idx !== i) }))}>Elimina</button></div>
                      <div className="grid cols-2">
                        <div><label>Tipo</label><input value={o.tipo || ""} onChange={e => { const next = bozza.osservazioni.slice(); next[i] = { ...next[i], tipo: e.target.value }; setBozza({ ...bozza, osservazioni: next }); }} /></div>
                        <div><label>Valore / Codice</label><input value={o.valore || ""} onChange={e => { const next = bozza.osservazioni.slice(); next[i] = { ...next[i], valore: e.target.value }; setBozza({ ...bozza, osservazioni: next }); }} /></div>
                      </div>
                      <div style={{ marginTop: "8px" }}><label>Descrizione</label><input value={o.descrizione || ""} onChange={e => { const next = bozza.osservazioni.slice(); next[i] = { ...next[i], descrizione: e.target.value }; setBozza({ ...bozza, osservazioni: next }); }} /></div>
                      <div style={{ marginTop: "8px" }}><label>Note</label><input value={o.note || ""} onChange={e => { const next = bozza.osservazioni.slice(); next[i] = { ...next[i], note: e.target.value }; setBozza({ ...bozza, osservazioni: next }); }} /></div>
                    </div>
                  ))}
                  <button className="btn secondary block" type="button" onClick={() => setBozza(prev => ({ ...prev, osservazioni: [...prev.osservazioni, { tipo: "", descrizione: "", note: "", valore: "" }] }))}>+ Aggiungi riga</button>
                </section>

                <div className="footer-actions">
                  <button className="btn primary save-btn-big" onClick={onSalva} title="Salva" aria-label="Salva"><svg className="icon-svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 3h13l3 3v15H4V3zm2 2v4h10V5H6zm0 14h12v-8H6v8zm2-6h8v4H8v-4z"/></svg></button>
                  <button className="btn danger block" onClick={onSubmit}>📤 Submit</button>
                </div>
              </>
            )}

            {vista === "visualizza" && (
              <>
                <section className="panel">
                  <h2>NC create e salvate</h2>
                  <div className="cards">
                    {!elencoNc.length && <div className="empty">Nessuna NC salvata.</div>}
                    {elencoNc.map(nc => (
                      <article key={nc.id} className={"card " + (nc.id === ncSelezionataId ? "selected" : "")} data-sev={nc.gravita || ""} onClick={() => setNcSelezionataId(nc.id)}>
                        <h3>#{"NC-" + String(nc.id).padStart(4, "0")} - {nc.titolo || "Senza titolo"}</h3>
                        <div className="meta"><span className={statoClasse(nc.stato)}>{nc.stato || "Bozza"}</span><span>{nc.categoria || "-"}</span><span>{nc.gravita || "-"}</span></div>
                        <div className="meta" style={{ marginTop: "6px" }}><span>{(nc.dataNc || "-") + " " + (nc.oraNc || "")}</span><span>{nc.reparto || "-"}</span></div>
                      </article>
                    ))}
                  </div>
                  <div className="inline" style={{ marginTop: "10px" }}>
                    <button className="btn secondary" disabled={ncSelezionataId == null || !archivio[String(ncSelezionataId)]} onClick={() => { const trovato = archivio[String(ncSelezionataId)]; if (!trovato) return; setBozza({ ...normalizzaNc(trovato) }); setVista("crea"); }}>Apri selezionata</button>
                  </div>
                </section>
                <section className="panel"><button className="btn secondary block" onClick={esportaJson}>Esporta JSON</button></section>
              </>
            )}
          </main>
          {vista === "crea" && alert.msg && <div className={"toast-fixed " + (alert.tipo === "ok" ? "ok" : "error")}>{alert.msg}</div>}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
